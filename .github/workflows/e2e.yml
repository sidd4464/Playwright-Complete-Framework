name: Playwright Cucumber Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      HEADLESS: "true"
      SLOW_MO: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node and Playwright
        uses: ./.github/actions/setup-playwright

      - name: Clean old Allure output
        run: |
          rm -rf allure-results
          rm -rf allure-report

      - name: Run Cucumber tests
        run: npm test

      - name: Generate Allure report
        if: always()
        run: npm run allure:report

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: error
          retention-days: 14

      - name: Upload Allure raw results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            allure-results
            allure-report
          if-no-files-found: ignore

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-pages:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
