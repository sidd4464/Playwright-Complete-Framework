name: Playwright Cucumber Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      HEADLESS: "false"
      SLOW_MO: "800"
      VIDEO: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node and Playwright
        uses: ./.github/actions/setup-playwright

      - name: Clean old Allure output
        run: |
          rm -rf allure-results
          rm -rf allure-report
          rm -rf test-results/videos

      - name: Run Cucumber tests (headed via Xvfb)
        run: xvfb-run --auto-servernum npm test

      - name: Generate Allure report
        if: always()
        run: npm run allure:report

      - name: Attach videos to Pages report
        if: always()
        run: |
          echo "Listing generated videos before packaging:"
          ls -la test-results/videos || true

          mkdir -p allure-report/videos
          if [ -d "test-results/videos" ] && find test-results/videos -maxdepth 1 -name "*.webm" -print -quit | grep -q .; then
            cp test-results/videos/*.webm allure-report/videos/
            {
              echo "<!doctype html><html><head><meta charset='utf-8'><title>Execution Videos</title></head><body>";
              echo "<h1>Execution Videos</h1><ul>";
              for file in allure-report/videos/*.webm; do
                [ -e "$file" ] || continue
                name=$(basename "$file")
                echo "<li><a href='./$name'>$name</a></li>";
              done
              echo "</ul></body></html>";
            } > allure-report/videos/index.html
          else
            echo "<!doctype html><html><head><meta charset='utf-8'><title>Execution Videos</title></head><body><h1>No videos generated for this run.</h1></body></html>" > allure-report/videos/index.html
          fi

          echo "<!doctype html><html><head><meta charset='utf-8'><meta http-equiv='refresh' content='0; url=./videos/'><title>Videos</title></head><body><a href='./videos/'>Open Execution Videos</a></body></html>" > allure-report/videos.html

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: error
          retention-days: 14

      - name: Upload Allure raw results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            allure-results
            allure-report
            test-results/videos
          if-no-files-found: ignore

      - name: Upload execution videos artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-videos
          path: test-results/videos
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Pages artifact
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy-pages:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
