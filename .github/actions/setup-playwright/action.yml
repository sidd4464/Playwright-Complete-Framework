name: Setup Node and Playwright
description: Install Node dependencies and Playwright browsers for this project
runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Install Playwright browsers
      shell: bash
      run: npx playwright install --with-deps chromium
